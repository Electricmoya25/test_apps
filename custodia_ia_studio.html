<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CustodiaApp</title>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --primary: #6366f1;
            --padre: #3b82f6;
            --padre-bg: #eff6ff;
            --madre: #ec4899;
            --madre-bg: #fdf2f8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
            padding: 20px;
        }
        .auth-card {
            background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 350px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); text-align: center;
        }

        /* --- HEADER --- */
        header {
            padding: calc(15px + var(--safe-top)) 20px 15px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;
        }
        .header-info h1 { font-size: 18px; font-weight: 800; }
        .header-info p { font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }

        /* --- CONTENIDO --- */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CALENDARIO --- */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { text-align: center; font-size: 10px; font-weight: 800; color: var(--text-light); margin-bottom: 5px; }
        .day {
            aspect-ratio: 1; background: white; border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
            border: 2px solid #f1f5f9; position: relative;
        }
        .day.madre { background: var(--madre-bg); border-color: #fbcfe8; color: var(--madre); }
        .day.padre { background: var(--padre-bg); border-color: #bfdbfe; color: var(--padre); }
        .day.today { border-color: var(--primary); }
        .day.other { opacity: 0.2; }
        .day-label { font-size: 18px; margin-top: 2px; }

        /* --- BOTONES / CARDS --- */
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        /* --- NAVEGACIÓN INFERIOR --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            padding: 10px 10px calc(10px + var(--safe-bottom));
            display: flex; justify-content: space-around; border-top: 1px solid #e2e8f0;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-light); font-size: 10px; font-weight: 600; text-decoration: none; border: none; background: none; }
        .nav-item.active { color: var(--primary); }

        /* TOAST */
        #toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 50px; font-size: 13px; z-index: 5000; display: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- PANTALLA DE ACCESO -->
    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-size: 40px; margin-bottom: 10px;">👨‍👩‍👧‍👦</h1>
            <h2>CustodiaApp</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Accede para ver tu calendario</p>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
            <button class="btn btn-primary" onclick="handleAuth()">Entrar / Registrarse</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <header>
        <div class="header-info">
            <h1 id="display-child">Mi Niño/a</h1>
            <p id="display-role">Cargando...</p>
        </div>
        <button onclick="handleLogout()" style="background:none; border:none; color:var(--text-light)"><i data-lucide="log-out"></i></button>
    </header>

    <div class="content">
        <!-- VISTA CALENDARIO -->
        <section id="view-home" class="view active">
            <div class="cal-nav">
                <button onclick="moveMonth(-1)" class="btn" style="width:auto; padding:8px; background:#f1f5f9">◀</button>
                <h3 id="month-label">Marzo 2024</h3>
                <button onclick="moveMonth(1)" class="btn" style="width:auto; padding:8px; background:#f1f5f9">▶</button>
            </div>
            <div id="calendar-grid" class="month-grid"></div>
        </section>

        <!-- VISTA AJUSTES -->
        <section id="view-settings" class="view">
            <h2>Configuración</h2>
            <div class="card">
                <label style="font-size: 12px; font-weight: 700; color: var(--text-light);">Nombre del Niño/a</label>
                <input type="text" id="input-child" style="width:100%; padding:12px; margin: 8px 0 15px; border-radius:8px; border:1px solid #e2e8f0;">
                
                <label style="font-size: 12px; font-weight: 700; color: var(--text-light);">Mi Rol</label>
                <select id="input-role" style="width:100%; padding:12px; margin: 8px 0 20px; border-radius:8px; border:1px solid #e2e8f0;">
                    <option value="madre">Madre</option>
                    <option value="padre">Padre</option>
                </select>
                
                <button class="btn btn-primary" onclick="saveSettings()">Guardar cambios</button>
            </div>
        </section>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)"><i data-lucide="calendar"></i>Hoy</button>
        <button class="nav-item" onclick="switchView('settings', this)"><i data-lucide="settings"></i>Ajustes</button>
    </nav>

    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        // --- TUS CREDENCIALES ORIGINALES ---
        const firebaseConfig = {
            apiKey: "AIzaSyAwgk4_l0zvaCUCgm1CjqqqXjJHr5KPBjc",
            authDomain: "custodia-familiar.firebaseapp.com",
            projectId: "custodia-familiar",
            storageBucket: "custodia-familiar.firebasestorage.app",
            messagingSenderId: "1038952432258",
            appId: "1:1038952432258:web:7608d6a48d8ad8308a6a9b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- ESTADO ---
        let user = null;
        let userData = { role: 'madre', childName: 'Mi Niño/a' };
        let currentMonth = new Date();
        const REF_DATE = new Date(2024, 0, 1); // Lunes base para rotación 7-7

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch {
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                } catch (e) { showToast("Error: " + e.message); }
            }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                syncData();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function handleLogout() { auth.signOut(); }

        // --- DATOS ---
        function syncData() {
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    updateUI();
                } else {
                    db.collection("users").doc(user.uid).set(userData);
                }
            });
            renderCalendar();
        }

        function updateUI() {
            document.getElementById('display-child').innerText = userData.childName;
            document.getElementById('display-role').innerText = "Viendo como " + userData.role;
            document.getElementById('input-child').value = userData.childName;
            document.getElementById('input-role').value = userData.role;
        }

        async function saveSettings() {
            const childName = document.getElementById('input-child').value;
            const role = document.getElementById('input-role').value;
            await db.collection("users").doc(user.uid).update({ childName, role });
            showToast("✅ Cambios guardados");
        }

        // --- CALENDARIO ---
        function getCustody(date) {
            const diff = Math.floor((date - REF_DATE) / 86400000);
            const weeks = Math.floor(diff / 7);
            return (Math.abs(weeks) % 2 === 0) ? 'padre' : 'madre';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            
            document.getElementById('month-label').innerText = new Intl.DateTimeFormat('es', {month:'long', year:'numeric'}).format(currentMonth);

            ['L','M','X','J','V','S','D'].forEach(d => grid.innerHTML += `<div class="weekday">${d}</div>`);

            const first = new Date(y, m, 1).getDay();
            const offset = first === 0 ? 6 : first - 1;
            const totalDays = new Date(y, m + 1, 0).getDate();

            for(let i=0; i<offset; i++) grid.innerHTML += `<div class="day other"></div>`;

            for(let d=1; d<=totalDays; d++) {
                const date = new Date(y, m, d, 12);
                const role = getCustody(date);
                const label = role === 'padre' ? '👨‍💼' : '👩‍💼';
                const isToday = new Date().toDateString() === date.toDateString();
                
                grid.innerHTML += `
                    <div class="day ${role} ${isToday ? 'today' : ''}">
                        ${d}
                        <div class="day-label">${label}</div>
                    </div>`;
            }
        }

        function moveMonth(n) { currentMonth.setMonth(currentMonth.getMonth() + n); renderCalendar(); }

        // --- UI UTILS ---
        function switchView(view, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+view).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            lucide.createIcons();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        lucide.createIcons();
    </script>
</body>
</html>
